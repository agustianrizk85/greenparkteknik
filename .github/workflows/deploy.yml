name: build-and-deploy

# Tiap push ke main: build dist (React/Vite), kirim isi dist/ ke docroot subdomain.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build # .env.production → VITE_API_BASE kosong (pakai /api relatif)

      - name: Deploy dist ke docroot
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "dist/*"
          target: ${{ secrets.WEB_ROOT }}
          strip_components: 1
          overwrite: true
